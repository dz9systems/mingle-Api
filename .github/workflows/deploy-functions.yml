name: Deploy Functions

# Runtime secrets live in GCP Secret Manager (set via firebase functions:secrets:set).
# GitHub only needs deploy credentials — not app API keys.
#
# GitHub repository secrets required:
#   FIREBASE_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID
#
# The deploy service account (client_email in FIREBASE_SERVICE_ACCOUNT JSON) needs:
#   roles/firebase.admin          — deploy Cloud Functions
#   roles/secretmanager.secretAccessor — validate bound secrets during deploy

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Prepare deploy env
        working-directory: functions
        run: cp .env.example .env

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Show deploy service account
        run: gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive --force

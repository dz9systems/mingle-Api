name: Deploy Functions

# Runtime secrets live in GCP Secret Manager (set via firebase functions:secrets:set).
# GitHub only needs deploy credentials — not app API keys.
#
# GitHub repository secrets required:
#   FIREBASE_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID
#
# The deploy service account (client_email in FIREBASE_SERVICE_ACCOUNT JSON) needs:
#   roles/firebase.admin — deploy Cloud Functions
#   roles/secretmanager.viewer (project-level) — firebase deploy validates secrets via versions.get
#   roles/secretmanager.secretAccessor (project-level) — bind secret values to functions
#
# Create secrets once (from a machine with owner/editor access):
#   cd functions && firebase functions:secrets:set SECRET_NAME --project PROJECT_ID
# Required secrets: RESEND_API_KEY, TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN,
#   TWILIO_MESSAGING_SERVICE_SID, GOOGLE_CLIENT_SECRET, GOOGLE_OAUTH_STATE_SECRET,
#   SPOTIFY_CLIENT_SECRET

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Prepare deploy env
        working-directory: functions
        run: cp .env.example .env

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Show deploy service account
        run: |
          echo "Auth service account: ${{ steps.auth.outputs.service_account_email }}"
          gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Verify Secret Manager access
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          # firebase deploy validates secrets with secretmanager.versions.get (viewer role),
          # then binds them with secretmanager.versions.access (secretAccessor role).
          secrets=(
            RESEND_API_KEY
            TWILIO_ACCOUNT_SID
            TWILIO_AUTH_TOKEN
            TWILIO_MESSAGING_SERVICE_SID
            GOOGLE_CLIENT_SECRET
            GOOGLE_OAUTH_STATE_SECRET
            SPOTIFY_CLIENT_SECRET
          )
          for secret in "${secrets[@]}"; do
            echo "Checking $secret..."
            gcloud secrets describe "$secret" --project="$FIREBASE_PROJECT_ID" > /dev/null
            gcloud secrets versions access latest \
              --secret="$secret" \
              --project="$FIREBASE_PROJECT_ID" \
              > /dev/null
          done

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: firebase deploy --only functions --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive --force

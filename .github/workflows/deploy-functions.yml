name: Deploy Functions

# Deploy service account (FIREBASE_SERVICE_ACCOUNT) needs Secret Manager access:
#   roles/secretmanager.admin  — create/update secrets and validate on deploy
# Also grant the Cloud Functions runtime SA secretAccessor on each secret
# (Firebase usually does this automatically when deploy succeeds).
#
# GitHub repository secrets required:
#   FIREBASE_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID
#   RESEND_API_KEY, TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN,
#   TWILIO_MESSAGING_SERVICE_SID, GOOGLE_CLIENT_SECRET,
#   GOOGLE_OAUTH_STATE_SECRET, SPOTIFY_CLIENT_SECRET

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Prepare deploy env
        working-directory: functions
        run: cp .env.example .env

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Sync Secret Manager secrets
        working-directory: functions
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_MESSAGING_SERVICE_SID: ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_OAUTH_STATE_SECRET: ${{ secrets.GOOGLE_OAUTH_STATE_SECRET }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/sync-deploy-secrets.mjs

      - name: Deploy functions
        run: firebase deploy --only functions --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive --force
